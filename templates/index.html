<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soulseek Web</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --surface2: #18181d;
    --border: #222228;
    --accent: #c8ff00;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #555566;
    --flac: #c8ff00;
    --mp3: #ff6b35;
    --other: #8888aa;
  }

  [x-cloak] { display: none !important; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* Layout */
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  .logo {
    padding: 20px 24px 18px;
    border-bottom: 1px solid var(--border);
  }

  .logo-img {
    height: 44px;
    width: auto;
    object-fit: contain;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 6px rgba(200,255,0,0.25));
  }

  .wizard-logo-img {
    height: 80px;
    width: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto 16px;
    filter: drop-shadow(0 0 12px rgba(200,255,0,0.35));
  }

  .logo-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .nav { padding: 16px 0; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
  }

  .nav-item:hover { color: var(--text); background: var(--surface2); }

  .nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(200, 255, 0, 0.04);
  }

  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .status-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #555;
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 600px;
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: #d4ff1a; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  .btn-danger {
    background: transparent;
    color: #ff4444;
    border: 1px solid #ff444433;
    padding: 4px 10px;
    border-radius: 3px;
    font-size: 10px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
  }

  .btn-danger:hover { background: #ff444422; }

  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    background: var(--surface2);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  /* Search results table */
  .results-table { width: 100%; border-collapse: collapse; }

  .results-table th {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .results-table td {
    padding: 9px 12px;
    border-bottom: 1px solid rgba(34,34,40,0.5);
    vertical-align: middle;
  }

  .results-table tr:hover td { background: var(--surface2); }

  .ext-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .ext-FLAC { background: rgba(200,255,0,0.15); color: var(--flac); }
  .ext-MP3  { background: rgba(255,107,53,0.15); color: var(--mp3); }
  .ext-other { background: rgba(136,136,170,0.1); color: var(--other); }

  .quality-cell { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text); }
  .quality-muted { color: var(--muted); }

  .filename-cell {
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
    font-size: 13px;
  }

  .peer-cell { font-family: 'Space Mono', monospace; font-size: 11px; }
  .peer-speed { color: var(--text); }
  .peer-queue { color: var(--muted); font-size: 10px; }

  .slot-free { color: var(--accent); font-size: 10px; }
  .slot-busy { color: var(--muted); font-size: 10px; }

  .btn-download {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(200,255,0,0.3);
    padding: 5px 12px;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .btn-download:hover { background: rgba(200,255,0,0.1); border-color: var(--accent); }
  .btn-download.downloading { color: var(--muted); border-color: var(--border); cursor: default; }

  /* State indicators */
  .searching-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 40px 0;
    justify-content: center;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
  }

  .empty-state-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-text { font-size: 13px; }

  /* Downloads – grouped by folder */
  .dl-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .dl-group:hover { border-color: #333340; }

  .dl-group-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
  }

  .dl-group-cover {
    width: 60px;
    height: 60px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .dl-group-cover-placeholder {
    width: 60px;
    height: 60px;
    border-radius: 4px;
    background: var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--muted);
  }

  .dl-group-info {
    flex: 1;
    min-width: 0;
  }
  .dl-group-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .dl-group-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .dl-group-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .dl-group-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.5s ease;
  }
  .dl-group-bar-fill.completed { background: #6fc; }
  .dl-group-bar-fill.errored   { background: #f44; }

  .dl-group-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .dl-btn-delete {
    background: none;
    border: 1px solid rgba(255,60,60,0.3);
    color: rgba(255,110,110,0.75);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dl-btn-delete:hover {
    background: rgba(255,60,60,0.1);
    border-color: rgba(255,60,60,0.65);
    color: #ff8888;
  }

  .dl-tracks {
    border-top: 1px solid var(--border);
    overflow: hidden;
    transition: max-height 0.25s ease;
  }
  .dl-track-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px 7px 88px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .dl-track-row:last-child { border-bottom: none; }
  .dl-track-name {
    flex: 1;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dl-track-pct {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    width: 30px;
    text-align: right;
    flex-shrink: 0;
  }
  .dl-track-bar {
    width: 50px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .dl-track-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  .state-Requested { background: rgba(130,130,200,0.12); color: #aab; }

  .state-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .state-InProgress { background: rgba(200,255,0,0.1); color: var(--accent); }
  .state-Completed  { background: rgba(100,200,100,0.1); color: #6fc; }
  .state-Queued     { background: rgba(255,200,0,0.1); color: #fc6; }
  .state-Errored, .state-Cancelled { background: rgba(255,68,68,0.1); color: #f66; }

  /* Library grid */
  .album-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  .album-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: all 0.2s;
    cursor: default;
  }

  .album-card:hover {
    border-color: #333340;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .album-cover {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--border);
  }

  .album-info { padding: 10px 12px; }

  .album-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .album-artist {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .album-tracks {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .filter-btn:hover { color: var(--text); border-color: #444; }
  .filter-btn.active { background: rgba(200,255,0,0.1); color: var(--accent); border-color: rgba(200,255,0,0.3); }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--text);
    max-width: 300px;
    animation: slideIn 0.2s ease;
    border-left: 3px solid var(--accent);
  }

  .toast.error { border-left-color: #ff4444; }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Scrollbar for results */
  .results-wrap { overflow-x: auto; }

  /* ── RESPONSIVE MOBILE ─────────────────────────────────── */
  @media (max-width: 640px) {
    /* Ocultar sidebar lateral */
    .sidebar { display: none; }

    /* Bottom nav fijo */
    .bottom-nav {
      display: flex !important;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 100;
    }

    /* Espacio extra abajo para que el contenido no quede bajo el nav */
    .main { padding-bottom: 60px; }
    .content { padding: 16px; }

    /* Topbar más compacto */
    .topbar {
      padding: 10px 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .search-wrap { min-width: 0; max-width: 100%; }

    /* Controles de modo y filtros en fila scrollable */
    .topbar-controls {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      width: 100%;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .topbar-controls::-webkit-scrollbar { display: none; }

    /* Ocultar columnas no esenciales en tablas */
    .col-hide-mobile { display: none; }

    /* Imágenes más pequeñas en resultados */
    .album-thumb { width: 36px !important; height: 36px !important; }

    /* Album grid: 2 columnas en móvil */
    .album-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }

  /* ── SETUP WIZARD ───────────────────────────────────────── */
  .wizard-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wizard-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px 44px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  .wizard-logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .wizard-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .wizard-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .field-group {
    margin-bottom: 18px;
  }

  .field-label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .field-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.4;
  }

  .wizard-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .wizard-input:focus { border-color: var(--accent); }
  .wizard-input::placeholder { color: var(--muted); }

  .wizard-error {
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.25);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12px;
    color: #ff6666;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .wizard-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .wizard-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .wizard-btn:hover:not(:disabled) { background: #d4ff1a; }
  .wizard-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  @media (max-width: 640px) {
    .wizard-card { padding: 28px 22px; }
  }

  /* Bottom nav (oculto en desktop) */
  .bottom-nav {
    display: none;
  }

  .bottom-nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.15s;
    border: none;
    background: none;
    position: relative;
    padding: 0;
  }

  .bottom-nav-item.active { color: var(--accent); }
  .bottom-nav-item .nav-icon { font-size: 20px; }

  .bottom-nav-badge {
    position: absolute;
    top: 6px;
    right: calc(50% - 18px);
    background: var(--accent);
    color: #000;
    font-size: 8px;
    font-weight: 700;
    border-radius: 8px;
    padding: 1px 4px;
    line-height: 1.4;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px;
  }

  .mode-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: var(--surface); color: var(--accent); }

  /* Expandable track list */
  .track-list {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 4px 0;
  }

  .track-row {
    display: flex;
    align-items: center;
    padding: 5px 16px 5px 74px;
    gap: 12px;
    border-bottom: 1px solid rgba(34,34,40,0.4);
  }

  .track-row:last-child { border-bottom: none; }
  .track-row:hover { background: var(--surface2); }

  .track-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    width: 20px;
    flex-shrink: 0;
    text-align: right;
  }

  .track-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
    font-size: 12px;
  }

  .track-size {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app" x-data="app()">

  <!-- ══ SETUP WIZARD ══════════════════════════════════════════════ -->
  <div class="wizard-overlay" x-show="setupDone === false" x-cloak>
    <div class="wizard-card">
      <img src="/static/logo.png" alt="SLSK//WEB" class="wizard-logo-img"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <div class="wizard-logo" style="display:none">SLSK//WEB</div>
      <div class="wizard-sub">Primera configuración</div>

      <!-- ── MODO LOCAL: instalación Windows autónoma (install.ps1) ── -->
      <template x-if="localSetup">
        <div>
          <div class="wizard-title">Cuenta de Soulseek</div>

          <div class="field-group">
            <label class="field-label">Usuario</label>
            <input
              class="wizard-input"
              type="text"
              placeholder="tu usuario de Soulseek"
              x-model="soulseekForm.soulseek_username"
              @keydown.enter="saveLocalSetup()"
              autocomplete="username"
            >
            <div class="field-hint">Si no tenés cuenta, creá una gratis en <a href="https://www.slsknet.org/" target="_blank" style="color:var(--accent)">slsknet.org</a></div>
          </div>

          <div class="field-group">
            <label class="field-label">Contraseña</label>
            <input
              class="wizard-input"
              type="password"
              placeholder="tu contraseña de Soulseek"
              x-model="soulseekForm.soulseek_password"
              @keydown.enter="saveLocalSetup()"
              autocomplete="current-password"
            >
          </div>

          <hr class="wizard-divider">

          <div class="wizard-title">Carpeta de descargas</div>

          <div class="field-group">
            <label class="field-label">Ruta local</label>
            <input
              class="wizard-input"
              type="text"
              x-model="soulseekForm.music_path"
              @keydown.enter="saveLocalSetup()"
            >
            <div class="field-hint">Carpeta donde se guardarán los archivos descargados.</div>
          </div>

          <div x-show="setupError" class="wizard-error" x-text="setupError"></div>

          <button
            class="wizard-btn"
            @click="saveLocalSetup()"
            :disabled="setupSaving || !soulseekForm.soulseek_username.trim() || !soulseekForm.soulseek_password.trim()"
          >
            <span x-show="!setupSaving">EMPEZAR</span>
            <span x-show="setupSaving">CONECTANDO... (puede tardar ~20 s)</span>
          </button>
        </div>
      </template>

      <!-- ── MODO REMOTO: slskd ya corre en otro servidor ── -->
      <template x-if="!localSetup">
        <div>
          <div class="wizard-title">Conexión con slskd</div>

          <div class="field-group">
            <label class="field-label">URL de slskd</label>
            <input
              class="wizard-input"
              type="url"
              placeholder="http://192.168.1.10:5030"
              x-model="setupForm.slskd_url"
              @keydown.enter="saveSetup()"
            >
            <div class="field-hint">Dirección donde corre tu instancia de slskd.</div>
          </div>

          <div class="field-group">
            <label class="field-label">API Key</label>
            <input
              class="wizard-input"
              type="password"
              placeholder="tu-api-key"
              x-model="setupForm.slskd_api_key"
              @keydown.enter="saveSetup()"
            >
            <div class="field-hint">La encontrás en tu <code style="color:var(--accent);font-size:11px;">slskd.yml</code> bajo <code style="color:var(--accent);font-size:11px;">web.authentication.apiKey</code>.</div>
          </div>

          <hr class="wizard-divider">

          <div class="wizard-title">Carpeta de descargas</div>

          <div class="field-group">
            <label class="field-label">Ruta local</label>
            <input
              class="wizard-input"
              type="text"
              placeholder="/mnt/music/downloads"
              x-model="setupForm.music_path"
              @keydown.enter="saveSetup()"
            >
            <div class="field-hint">Carpeta donde slskd guarda los archivos descargados.</div>
          </div>

          <div x-show="setupError" class="wizard-error" x-text="setupError"></div>

          <button
            class="wizard-btn"
            @click="saveSetup()"
            :disabled="setupSaving || !setupForm.slskd_url.trim() || !setupForm.slskd_api_key.trim()"
          >
            <span x-show="!setupSaving">CONECTAR Y GUARDAR</span>
            <span x-show="setupSaving">VERIFICANDO...</span>
          </button>
        </div>
      </template>

    </div>
  </div>
  <!-- ══ /SETUP WIZARD ═════════════════════════════════════════════ -->

  <!-- Bottom nav (móvil) — dentro del x-data para acceder al estado Alpine -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item" :class="{ active: view === 'search' }" @click="view = 'search'">
      <span class="nav-icon">⌕</span>
      <span x-text="t('navSearch')"></span>
    </button>
    <button class="bottom-nav-item" :class="{ active: view === 'downloads' }" @click="view = 'downloads'; loadDownloads()">
      <span class="nav-icon">↓</span>
      <span x-text="t('navDownloads')"></span>
      <span x-show="activeDownloads > 0" class="bottom-nav-badge" x-text="activeDownloads"></span>
    </button>
    <button class="bottom-nav-item" :class="{ active: view === 'settings' }" @click="view = 'settings'; loadSettings()">
      <span class="nav-icon">⚙</span>
      <span x-text="t('navSettings')"></span>
    </button>
  </nav>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="/static/logo.png" alt="SLSK//WEB" class="logo-img"
           onerror="this.style.display='none'">
      <div class="logo-title">SLSK//WEB</div>
      <div class="logo-sub" x-text="platform || 'soulseek client'">soulseek client</div>
    </div>
    <nav class="nav">
      <div class="nav-item" :class="{ active: view === 'search' }" @click="view = 'search'">
        <span class="nav-icon">⌕</span> <span x-text="t('navSearch')"></span>
      </div>
      <div class="nav-item" :class="{ active: view === 'downloads' }" @click="view = 'downloads'; loadDownloads()">
        <span class="nav-icon">↓</span> <span x-text="t('navDownloads')"></span>
        <span x-show="activeDownloads > 0" class="badge" x-text="activeDownloads" style="margin-left:auto"></span>
      </div>
      <div class="nav-item" :class="{ active: view === 'settings' }" @click="view = 'settings'; loadSettings()">
        <span class="nav-icon">⚙</span> <span x-text="t('navSettings')"></span>
      </div>
    </nav>
    <div class="status-bar">
      <span class="status-dot" :class="{ connected: connected }"></span>
      <span x-text="connected ? t('connected') : t('disconnected')"></span>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Search view -->
    <template x-if="view === 'search'">
      <div style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
        <div class="topbar">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input
              class="search-input"
              type="text"
              :placeholder="t('searchPlaceholder')"
              x-model="query"
              @keydown.enter="doSearch()"
            >
          </div>
          <button class="btn" @click="doSearch()" :disabled="searching || !query.trim()">
            <span x-show="!searching" x-text="t('searchBtn')"></span>
            <span x-show="searching" x-text="t('searchingBtn')"></span>
          </button>
          <button x-show="searchId" class="btn-ghost" @click="stopSearch()" x-text="t('stopBtn')"></button>

          <!-- Mode toggle + Filters (scrollable row en móvil) -->
          <div class="topbar-controls">
            <div class="mode-toggle">
              <button class="mode-btn" :class="{ active: searchMode === 'albums' }" @click="searchMode = 'albums'" x-text="t('albumsMode')"></button>
              <button class="mode-btn" :class="{ active: searchMode === 'songs' }" @click="searchMode = 'songs'" x-text="t('songsMode')"></button>
            </div>
            <div style="display:flex; gap:6px; align-items:center;">
              <button class="filter-btn" :class="{ active: filterExt === '' }" @click="filterExt = ''" x-text="t('allFilter')"></button>
              <button class="filter-btn" :class="{ active: filterExt === 'FLAC' }" @click="filterExt = 'FLAC'">FLAC</button>
              <button class="filter-btn" :class="{ active: filterExt === 'MP3' }" @click="filterExt = 'MP3'">MP3</button>
              <span x-show="advancedSearch" style="padding:2px 8px; border-radius:3px; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:0.1em; background:rgba(200,255,0,0.12); color:var(--accent); border:1px solid rgba(200,255,0,0.35);">ADV</span>
            </div>
          </div>
        </div>

        <div class="content">
          <!-- Searching spinner -->
          <div x-show="searching" class="searching-indicator">
            <div class="spinner"></div>
            <span><span x-text="t('searchingNet')"></span> <span x-text="albums.length"></span> <span x-text="t('albumsUnit')"></span></span>
          </div>

          <!-- Empty state -->
          <div x-show="!searching && albums.length === 0 && !searchId" class="empty-state">
            <div class="empty-state-icon">⌕</div>
            <div class="empty-state-text" x-text="t('emptySearch')"></div>
          </div>

          <!-- Albums view -->
          <div x-show="searchMode === 'albums' && filteredAlbums.length > 0">
            <div class="section-header">
              <span class="section-title" x-text="t('albumsFound')"></span>
              <span class="badge" x-text="filteredAlbums.length + ' ' + (filteredAlbums.length === 1 ? t('albumUnit') : t('albumsUnit'))"></span>
            </div>
            <div class="results-wrap">
              <table class="results-table">
                <thead>
                  <tr>
                    <th x-text="t('colFormat')"></th>
                    <th x-text="t('colAlbum')"></th>
                    <th class="col-hide-mobile" x-text="t('colQuality')"></th>
                    <th class="col-hide-mobile">TRACKS</th>
                    <th class="col-hide-mobile" x-text="t('colSize')"></th>
                    <th class="col-hide-mobile">PEER</th>
                    <th class="col-hide-mobile">SLOT</th>
                    <th></th>
                  </tr>
                </thead>
                <template x-for="(a, i) in filteredAlbums.slice(0, 200)" :key="a.folder_path + '::' + i">
                  <tbody>
                    <tr style="cursor:pointer;" @click="expandedAlbum = expandedAlbum === a.folder_path ? null : a.folder_path">
                      <td>
                        <span class="ext-badge" :class="'ext-' + (a.extension === 'FLAC' || a.extension === 'MP3' ? a.extension : 'other')" x-text="a.extension"></span>
                      </td>
                      <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                          <img
                            :src="'/api/covers/search?artist=' + encodeURIComponent(a.artist_guess) + '&album=' + encodeURIComponent(a.folder_name)"
                            class="album-thumb"
                            style="width:44px; height:44px; object-fit:cover; border-radius:4px; background:var(--surface2); flex-shrink:0;"
                            onerror="this.style.visibility='hidden'"
                          >
                          <div>
                            <div class="filename-cell" :title="a.folder_path" x-text="a.folder_name"></div>
                            <div style="font-size:10px; color:var(--muted); margin-top:2px;" x-text="a.artist_guess || a.username"></div>
                          </div>
                        </div>
                      </td>
                      <td class="quality-cell col-hide-mobile">
                        <span x-text="a.bitrate ? a.bitrate + ' kbps' : '—'"></span>
                        <span class="quality-muted" x-show="a.sample_rate"> · <span x-text="a.sample_rate ? (a.sample_rate/1000).toFixed(1) : ''"></span>kHz</span>
                        <span class="quality-muted" x-show="a.bit_depth"> · <span x-text="a.bit_depth"></span>bit</span>
                      </td>
                      <td class="quality-cell quality-muted col-hide-mobile" x-text="a.track_count + ' tracks'"></td>
                      <td class="quality-cell quality-muted col-hide-mobile" x-text="formatSize(a.total_size)"></td>
                      <td class="peer-cell col-hide-mobile">
                        <div class="peer-speed" x-text="formatSpeed(a.upload_speed)"></div>
                        <div class="peer-queue" x-show="a.queue_length > 0"><span x-text="t('queueLabel')"></span>: <span x-text="a.queue_length"></span></div>
                      </td>
                      <td class="col-hide-mobile">
                        <span x-show="a.free_slots" class="slot-free" x-text="t('free')"></span>
                        <span x-show="!a.free_slots" class="slot-busy" x-text="t('busy')"></span>
                      </td>
                      <td style="white-space:nowrap;">
                        <span x-text="expandedAlbum === a.folder_path ? '▲' : '▼'" style="color:var(--muted); font-size:10px; margin-right:6px;"></span>
                        <button
                          class="btn-download"
                          :class="{ downloading: downloadingFolders.has(a.folder_path) }"
                          @click.stop="downloadFolder(a)"
                          :disabled="downloadingFolders.has(a.folder_path)"
                          x-text="downloadingFolders.has(a.folder_path) ? t('queued') : t('download')"
                        ></button>
                      </td>
                    </tr>
                    <!-- Expanded track list -->
                    <tr x-show="expandedAlbum === a.folder_path">
                      <td colspan="8" style="padding:0;">
                        <div class="track-list">
                          <template x-for="(f, fi) in a.files" :key="fi">
                            <div class="track-row">
                              <span class="track-num" x-text="fi + 1"></span>
                              <span class="track-name" x-text="f.filename.split('\\').pop().split('/').pop()"></span>
                              <span class="track-size" x-text="formatSize(f.size)"></span>
                              <button
                                class="btn-download"
                                style="padding:3px 10px; font-size:9px; flex-shrink:0;"
                                @click.stop="downloadSingle(a.username, f)"
                              >↓</button>
                            </div>
                          </template>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </template>
              </table>
            </div>
          </div>

          <!-- Songs view -->
          <div x-show="searchMode === 'songs' && flatSongs.length > 0">
            <div class="section-header">
              <span class="section-title" x-text="t('songsFound')"></span>
              <span class="badge" x-text="flatSongs.length + ' ' + (flatSongs.length === 1 ? t('songUnit') : t('songsUnit'))"></span>
            </div>
            <div class="results-wrap">
              <table class="results-table">
                <thead>
                  <tr>
                    <th x-text="t('colFormat')"></th>
                    <th x-text="t('colSong')"></th>
                    <th x-text="t('colAlbumShort')"></th>
                    <th x-text="t('colQuality')"></th>
                    <th x-text="t('colSize')"></th>
                    <th>PEER</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(s, i) in flatSongs.slice(0, 500)" :key="i">
                    <tr>
                      <td>
                        <span class="ext-badge" :class="'ext-' + (s.extension === 'FLAC' || s.extension === 'MP3' ? s.extension : 'other')" x-text="s.extension"></span>
                      </td>
                      <td>
                        <div class="filename-cell" :title="s.filename" x-text="s.displayName"></div>
                      </td>
                      <td>
                        <div style="font-size:12px; color:var(--text); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" x-text="s.folder_name"></div>
                        <div style="font-size:10px; color:var(--muted); margin-top:2px;" x-text="s.artist_guess || s.username"></div>
                      </td>
                      <td class="quality-cell">
                        <span x-text="s.bitrate ? s.bitrate + ' kbps' : '—'"></span>
                      </td>
                      <td class="quality-cell quality-muted" x-text="formatSize(s.size)"></td>
                      <td class="peer-cell">
                        <div class="peer-speed" x-text="formatSpeed(s.upload_speed)"></div>
                        <div class="peer-queue" x-show="s.queue_length > 0"><span x-text="t('queueLabel')"></span>: <span x-text="s.queue_length"></span></div>
                      </td>
                      <td>
                        <button
                          class="btn-download"
                          @click="downloadSingle(s.username, {filename: s.filename, size: s.size})"
                          x-text="t('download')"
                        >'download')"
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Downloads view -->
    <template x-if="view === 'downloads'">
      <div style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
        <div class="topbar"> x-text="t('downloadsTitle')"></span>
          <span class="badge" x-text="downloads.length + ' ' + (downloads.length === 1 ? t('albumUnit') : t('albumsUnit'))" style="margin-left:auto"></span>
          <button class="btn-ghost" @click="loadDownloads()" x-text="t('refresh')">h === 1 ? ' álbum' : ' álbumes')" style="margin-left:auto"></span>
          <button class="btn-ghost" @click="loadDownloads()">↺ ACTUALIZAR</button>
        </div>
        <div class="content">
          <div x-show="downloads.length === 0" class="empty-state">
            <div class="empty-state-icon" x-text="t('noDownloads')">
            <div class="empty-state-text">No hay descargas</div>
          </div>

          <template x-for="(g, gi) in downloads" :key="g.username + '::' + g.directory">
            <div class="dl-group">

              <!-- Group header: cover + info + actions -->
              <div class="dl-group-header" @click="expandedGroup = (expandedGroup === gi ? null : gi)">

                <!-- Album art -->
                <img class="dl-group-cover"
                  :src="groupCoverUrl(g.folder_name)"
                  @error="$el.style.display='none'; $el.nextElementSibling.style.display='flex'"
                  loading="lazy"
                  style="display:block">
                <div class="dl-group-cover-placeholder" style="display:none">♪</div>

                <!-- Folder info -->
                <div class="dl-group-info">
                  <div class="dl-group-name" :title="g.folder_name" x-text="g.folder_name"></div>
                  <div class="dl-group-meta">
                    <span x-text="g.username"></span>t('fileUnit') : t('filesUnit')
                    <span x-text="g.files.length + ' ' + (g.files.length === 1 ? 'archivo' : 'archivos')"></span>
                    <span x-show="g.total_size > 0" x-text="formatSize(g.total_size)"></span>
                    <span x-show="g.speed > 0" x-text="formatSpeed(g.speed) + '/s'"></span>
                  </div>
                  <div class="dl-group-bar">
                    <div class="dl-group-bar-fill"
                      :class="{ completed: g.state === 'Completed', errored: g.state.includes('Errored') }"
                      :style="'width:' + (g.progress || 0) + '%'">
                    </div>
                  </div>
                </div>

                <!-- State + delete -->
                <div class="dl-group-actions" @click.stop>
                  <span class="state-badge" :class="'state-' + g.state.s x-text="t('delete')">[0].trim()" x-text="stateLabel(g.state)"></span>
                  <button class="dl-btn-delete" @click="deleteFolder(g)">✕ BORRAR</button>
                </div>
              </div>

              <!-- Track list (collapsible) -->
              <div class="dl-tracks" x-show="expandedGroup === gi">
                <template x-for="(f, fi) in g.files" :key="fi">
                  <div class="dl-track-row">
                    <div class="dl-track-name" :title="f.filename" x-text="f.filename"></div>
                    <span class="state-badge"
                      :class="'state-' + f.state.split(',')[0].trim()"
                      x-text="stateLabel(f.state)"
                      style="font-size:8px; padding:1px 5px; flex-shrink:0">
                    </span>
                    <div class="dl-track-bar">
                      <div class="dl-track-bar-fill" :style="'width:' + (f.percent || 0) + '%'"></div>
                    </div>
                    <span class="dl-track-pct"
                      x-show="f.percent > 0 && f.percent < 100"
                      x-text="f.percent.toFixed(0) + '%'">
                    </span>
                  </div>
                </template>
              </div>

            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Settings view -->
    <template x-if="view === 'settings'">
      <div style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
        <div class="topbar"> x-text="t('settingsTitle')">
          <span style="font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:0.1em;">AJUSTES</span>
          <span x-show="platform" x-text="platform" style="margin-left:8px; padding:2px 8px; border-radius:3px; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; background:rgba(200,255,0,0.08); color:var(--accent); border:1px solid rgba(200,255,0,0.2);"></span>
        </div>
        <div class="content" style="max-width:520px;">

          <!-- Local mode: Soulseek account + music path -->
          <template x-if="localSetup">
            <div>
              <div class="section-header" style="margin-bottom:20px;">

function app() {
  return {
    view: 'search',
    query: '',
    searching: false,
    searchId: null,
    searchPoll: null,
    albums: [],
    filterExt: '',
    downloads: [],
    downloadPoll: null,
    libraryAlbums: [],
    libraryLoading: false,
    connected: false,
    downloadingFolders: new Set(),
    toasts: [],
    searchMode: 'albums',
    expandedAlbum: null,
    expandedGroup: null,

    // Setup wizard
    setupDone: null,      // null = cargando, false = necesita config, true = listo
    localSetup: false,    // true = instalación Windows autónoma (install.ps1)
    platform: '',
    setupForm: { slskd_url: '', slskd_api_key: '', music_path: '' },
    soulseekForm: { soulseek_username: '', soulseek_password: '', music_path: '' },
    setupError: '',
    setupSaving: false,

    // Settings panel
    settingsForm: { soulseek_username: '', soulseek_password: '', music_path: '', slskd_url: '', slskd_api_key: '' },
    settingsSaving: false,
    settingsError: '',
    settingsOk: false,
    advancedSearch: false,
    lang: localStorage.getItem('slskweb_lang') || 'es',
    alreadyLatest: false,

    t(key) {
      return (TRANSLATIONS[this.lang] || TRANSLATIONS.es)[key] || (TRANSLATIONS.es[key] || key);
    },

    // Update
    appVersion: '',
    appCommit: '',
    updating: false,
    updateLog: '',
    updateError: '',
    updateNeedsRestart: false,

    get filteredAlbums() {
      if (!this.filterExt) return this.albums;
      return this.albums.filter(a => a.extension === this.filterExt);
    },

    get flatSongs() {
      const songs = [];
      for (const a of this.albums) {
        for (const f of a.files) {
          const name = f.filename.split('\\').pop().split('/').pop();
          songs.push({
            filename: f.filename,
            displayName: name,
            size: f.size,
            extension: a.extension,
            bitrate: a.bitrate,
            username: a.username,
            folder_name: a.folder_name,
            artist_guess: a.artist_guess,
            upload_speed: a.upload_speed,
            free_slots: a.free_slots,
            queue_length: a.queue_length,
          });
        }
      }
      if (this.filterExt) return songs.filter(s => s.extension === this.filterExt);
      return songs;
    },

    get activeDownloads() {
      return this.downloads.filter(g => g.state === 'InProgress').length;
    },

    async init() {
      await this.checkSetup();
      this.loadVersion();
      if (this.setupDone) {
        await this.checkStatus();
        setInterval(() => this.checkStatus(), 10000);
      }
      // Auto-refresh downloads if on that view
      this.downloadPoll = setInterval(() => {
        if (this.view === 'downloads') this.loadDownloads();
      }, 3000);
    },

    async checkSetup() {
      try {
        const r = await fetch('/api/setup/status');
        const data = await r.json();
        this.localSetup = !!data.local_setup;
        this.platform = data.platform || '';
        if (data.configured) {
          this.setupDone = true;
          if (data.slskd_url)   this.setupForm.slskd_url  = data.slskd_url;
          if (data.music_path)  this.setupForm.music_path = data.music_path;
          if (data.music_path)  this.soulseekForm.music_path = data.music_path;
        } else {
          this.setupDone = false;
          if (data.music_path)  this.soulseekForm.music_path = data.music_path;
        }
      } catch {
        this.setupDone = false;
      }
    },

    // Modo remoto: el usuario ya tiene slskd corriendo en otro servidor
    async saveSetup() {
      this.setupError = '';
      this.setupSaving = true;
      try {
        const r = await fetch('/api/setup/credentials', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.setupForm)
        });
        const data = await r.json();
        if (data.ok) {
          this.setupDone = true;
          await this.checkStatus();
          setInterval(() => this.checkStatus(), 10000);
          this.toast('✓ Configuración guardada');
        } else {
          this.setupError = data.error || 'Error desconocido';
        }
      } catch (e) {
        this.setupError = 'No se pudo conectar con el servidor.';
      } finally {
        this.setupSaving = false;
      }
    },

    // Modo local Windows: configura slskd automáticamente
    async saveLocalSetup() {
      this.setupError = '';
      this.setupSaving = true;
      try {
        const r = await fetch('/api/setup/soulseek', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.soulseekForm)
        });
        const data = await r.json();
        if (data.ok) {
          this.setupDone = true;
          await this.checkStatus();
          setInterval(() => this.checkStatus(), 10000);
          this.toast('✓ ¡Listo! Conectado a Soulseek');
        } else {
          this.setupError = data.error || 'Error desconocido';
        }
      } catch (e) {
        this.setupError = 'No se pudo conectar con el servidor.';
      } finally {
        this.setupSaving = false;
      }
    },

    async loadVersion() {
      try {
        const r = await fetch('/api/setup/version');
        const d = await r.json();
        this.appVersion = d.version;
        this.appCommit  = d.commit;
      } catch(e) {}
    },

    async triggerUpdate() {
      this.updating = true;
      this.updateLog = '';
      this.updateError = '';
      this.updateNeedsRestart = false;
      try {
        const r = await fetch('/api/setup/update', { method: 'POST' });
        const d = await r.json();
        if (!d.ok) {
          this.updateError = d.error || 'Error desconocido';
          return;
        }
        if (d.already_latest) {
          this.alreadyLatest = true;
          this.updateLog = '✓ ' + this.t('upToDate') + ' (' + (d.version || this.appVersion) + ')';
        } else {
          this.alreadyLatest = false;
          this.updateLog = (d.pull_output || '') + '\n✓ Actualizado a ' + (d.version || '?');
          if (d.needs_restart) {
            this.updateNeedsRestart = true;
          } else {
            this.toast(this.t('updatedRestarting'));
            // Server will restart; reconnect after a few seconds
            await new Promise(r => setTimeout(r, 4000));
            window.location.reload();
          }
        }
        this.appVersion = d.version || this.appVersion;
      } catch(e) {
        this.updateError = this.t('updateConnError');
      } finally {
        this.updating = false;
      }
    },

    async loadSettings() {
      try {
        const r = await fetch('/api/setup/settings');
        const data = await r.json();
        this.platform = data.platform || this.platform;
        this.settingsForm.soulseek_username = data.soulseek_username || '';
        this.settingsForm.soulseek_password = data.soulseek_password || '';
        this.settingsForm.music_path = data.music_path || '';
        this.settingsForm.slskd_url = data.slskd_url || '';
        this.settingsForm.slskd_api_key = data.slskd_api_key || '';
        this.advancedSearch = !!data.advanced_search;
        if (data.lang) { this.lang = data.lang; localStorage.setItem('slskweb_lang', this.lang); }
        this.settingsError = '';
        this.settingsOk = false;
      } catch {}
    },

    async saveSettings() {
      this.settingsError = '';
      this.settingsOk = false;
      this.settingsSaving = true;
      try {
        const url  = this.localSetup ? '/api/setup/soulseek' : '/api/setup/credentials';
        const body = this.localSetup
          ? { soulseek_username: this.settingsForm.soulseek_username,
              soulseek_password: this.settingsForm.soulseek_password,
              music_path:        this.settingsForm.music_path }
          : { slskd_url:          this.settingsForm.slskd_url,
              slskd_api_key:      this.settingsForm.slskd_api_key,
              music_path:         this.settingsForm.music_path,
              soulseek_username:  this.settingsForm.soulseek_username,
              soulseek_password:  this.settingsForm.soulseek_password };
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (data.ok) {
          this.settingsOk = true;
          this.toast(this.t('settingsSaved'));
        } else {
          this.settingsError = data.error || this.t('unknownError');
        }
      } catch {
        this.settingsError = this.t('connError');
      } finally {
        this.settingsSaving = false;
      }
    },

    async checkStatus() {
      try {
        const r = await fetch('/api/downloads/');
        this.connected = r.ok;
      } catch { this.connected = false; }
    },

    async doSearch() {
      if (!this.query.trim()) return;
      this.stopSearch();
      this.albums = [];
      this.searching = true;

      try {
        const r = await fetch('/api/search/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: this.query })
        });
        const data = await r.json();
        this.searchId = data.search_id;
        this.pollResults();
      } catch(e) {
        this.toast(this.t('searchError'), true);
        this.searching = false;
      }
    },

    async savePreferences() {
      try {
        await fetch('/api/setup/preferences', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ advanced_search: this.advancedSearch, lang: this.lang }),
        });
      } catch {}
    },

    setLang(l) {
      this.lang = l;
      localStorage.setItem('slskweb_lang', l);
      this.savePreferences();
    },

    pollResults() {
      this.searchPoll = setInterval(async () => {
        if (!this.searchId) return;
        try {
          const r = await fetch('/api/search/' + this.searchId + '?raw=' + this.advancedSearch);
          const data = await r.json();
          this.albums = data.albums || [];
          if (data.state && data.state.includes('Completed')) {
            this.searching = false;
            clearInterval(this.searchPoll);
          }
        } catch(e) {}
      }, 1500);

      setTimeout(() => {
        this.searching = false;
        clearInterval(this.searchPoll);
      }, 30000);
    },

    stopSearch() {
      clearInterval(this.searchPoll);
      this.searching = false;
      if (this.searchId) {
        fetch('/api/search/' + this.searchId, { method: 'DELETE' });
        this.searchId = null;
      }
    },

    async downloadFolder(a) {
      this.downloadingFolders = new Set([...this.downloadingFolders, a.folder_path]);
      try {
        const resp = await fetch('/api/downloads/folder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: a.username,
            files: a.files
          })
        });
        if (resp.ok) {
          this.toast(this.t('downloadingAlbum') + ': ' + a.folder_name + ' (' + a.track_count + ' tracks)');
        } else {
          this.toast(this.t('dlError'), true);
          this.downloadingFolders.delete(a.folder_path);
          this.downloadingFolders = new Set(this.downloadingFolders);
        }
      } catch(e) {
        this.toast(this.t('connError'), true);
      }
    },

    async downloadSingle(username, file) {
      try {
        const resp = await fetch('/api/downloads/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, filename: file.filename, size: file.size })
        });
        if (resp.ok) {
          const name = file.filename.split('\\').pop().split('/').pop();
          this.toast('↓ ' + name);
        } else {
          this.toast(this.t('dlError'), true);
        }
      } catch(e) {
        this.toast(this.t('connError'), true);
      }
    },

    async loadDownloads() {
      try {
        const r = await fetch('/api/downloads/');
        this.downloads = await r.json();
      } catch(e) {}
    },

    groupCoverUrl(folderName) {
      return `/api/covers/folder?folder_name=${encodeURIComponent(folderName)}`;
    },

    stateLabel(state) {
      const s = (state || '').split(',')[0].trim();
      const map = {
        'Completed':  '✓ OK',
        'InProgress': '↓ DESC.',
        'Queued':     '⏸ COLA',
        'Requested':  '⟳ PEDIDO',
        'Errored':    '✗ ERROR',
        'Cancelled':  '✕ CANCEL.',
      };
      return map[s] || s;
    },

    async deleteFolder(group) {
      if (!confirm(this.t('confirmDelete').replace('{name}', group.folder_name))) return;
      try {
        const r = await fetch('/api/downloads/folder', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: group.username,
            file_ids: group.file_ids,
            local_paths: group.local_paths,
            folder_name: group.folder_name,
            filenames: group.files.map(f => f.filename),
          })
        });
        const data = await r.json();
        if (data.ok) {
          this.toast(this.t('deleted') + ': ' + group.folder_name);
          await this.loadDownloads();
        } else {
          this.toast(this.t('deleteError'), true);
        }
      } catch(e) {
        this.toast(this.t('connError'), true);
      }
    },

    async loadLibrary() {
      this.libraryLoading = true;
      try {
        const r = await fetch('/api/library/albums');
        this.libraryAlbums = await r.json();
      } catch(e) {
        this.toast('Error cargando librería', true);
      } finally {
        this.libraryLoading = false;
      }
    },

    formatSize(bytes) {
      if (!bytes) return '—';
      if (bytes > 1e9) return (bytes/1e9).toFixed(2) + ' GB';
      if (bytes > 1e6) return (bytes/1e6).toFixed(1) + ' MB';
      return (bytes/1e3).toFixed(0) + ' KB';
    },

    formatSpeed(bps) {
      if (!bps) return '—';
      if (bps > 1e6) return (bps/1e6).toFixed(1) + ' MB/s';
      if (bps > 1e3) return (bps/1e3).toFixed(0) + ' KB/s';
      return bps + ' B/s';
    },

    toast(msg, error = false) {
      this.toasts.push({ msg, error });
      setTimeout(() => this.toasts.shift(), 3500);
    }
  }
}
</script>
</body>
</html>
